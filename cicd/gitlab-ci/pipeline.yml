stages:
  - validate
  - build
  - deploy

variables:
  TF_WORKING_DIR: "iac/terraform/environments/dev"
  DOCKER_IMAGE: "emersoft76/sample-microservice"

terraform_validate:
  stage: validate
  image: hashicorp/terraform:1.9
  script:
    - cd ${TF_WORKING_DIR}
    - terraform init
    - terraform fmt -check -recursive
    - terraform validate

docker_build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker build -t ${DOCKER_IMAGE}:latest containers/docker/sample-microservice
  only:
    - main

kubernetes_deploy:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_CONTENT" > ~/.kube/config
    - kubectl apply -f containers/kubernetes/deployments/sample-microservice-deployment.yaml
    - kubectl apply -f containers/kubernetes/services/sample-microservice-service.yaml
    - kubectl apply -f containers/kubernetes/ingress/sample-microservice-ingress.yaml
  only:
    - main
