apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-microservice-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: sample.devops-playbook.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sample-microservice-service
                port:
                  number: 80
